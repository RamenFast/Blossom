<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Blossom · blob-emojis — Blobmoji as the desktop-wide emoji font.
       Text fonts stay exactly as they are; only emoji fallback is rerouted.

       Canonical copy: ~/Dev/ClaudeWorkspace/blossom/blob-emojis/75-blobmoji.conf
       Installed to:   ~/.config/fontconfig/conf.d/75-blobmoji.conf          (host)
                       ~/.var/app/<id>/config/fontconfig/conf.d/…           (each flatpak)
       Reapply with:   blossom/blob-emojis/install.sh

       Rule order matters: rules run top-to-bottom, and this file runs at the
       50-user position — after 45-generic.conf, before 60-generic.conf (which
       prefers Noto Color Emoji for the emoji family). -->

  <!-- 1. Append the generic 'emoji' family to every lookup, weakly bound:
         it is only consulted for glyphs the requested font itself lacks, so
         text, digits and symbols are untouched. This routes emoji fallback in
         terminals (kitty/ghostty charset queries), GTK/Qt (pango) and
         Chromium/Electron through the emoji alias below. Must run BEFORE the
         alias so the alias fires for patterns that had no emoji family yet. -->
  <match target="pattern">
    <edit name="family" mode="append" binding="weak"><string>emoji</string></edit>
  </match>

  <!-- 2. Blobmoji heads the generic 'emoji' family. Because this runs before
         60-generic.conf, Blobmoji is inserted ahead of the spot where Noto
         Color Emoji will land — Noto stays installed as fallback for emoji
         newer than Blobmoji's Unicode 15.0. -->
  <alias binding="same">
    <family>emoji</family>
    <prefer><family>Blobmoji</family></prefer>
  </alias>

  <!-- 3. Apps that ask for some other emoji font by name get Blobmoji. -->
  <match target="pattern">
    <test name="family"><string>Noto Color Emoji</string></test>
    <edit name="family" mode="assign" binding="same"><string>Blobmoji</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Apple Color Emoji</string></test>
    <edit name="family" mode="assign" binding="same"><string>Blobmoji</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Segoe UI Emoji</string></test>
    <edit name="family" mode="assign" binding="same"><string>Blobmoji</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Twitter Color Emoji</string></test>
    <edit name="family" mode="assign" binding="same"><string>Blobmoji</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Twemoji</string></test>
    <edit name="family" mode="assign" binding="same"><string>Blobmoji</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Twemoji Mozilla</string></test>
    <edit name="family" mode="assign" binding="same"><string>Blobmoji</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>EmojiOne</string></test>
    <edit name="family" mode="assign" binding="same"><string>Blobmoji</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>EmojiOne Color</string></test>
    <edit name="family" mode="assign" binding="same"><string>Blobmoji</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>JoyPixels</string></test>
    <edit name="family" mode="assign" binding="same"><string>Blobmoji</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>OpenMoji</string></test>
    <edit name="family" mode="assign" binding="same"><string>Blobmoji</string></edit>
  </match>
</fontconfig>
