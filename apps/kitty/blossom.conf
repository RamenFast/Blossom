# ============================================================
#  Blossom theme — AMOLED void, pink primary, gold secondary
#  Foreground: #eaf6ff (vectorscope light-blue)
#  Background: #000000 (true black)
#  Cursor:     #db3776 (pink — what you're acting on)
#  Selection:  pink on black-inverted
#  Rule: pink = acting on, gold = reference/warning, red = danger
# ============================================================

# Base
foreground              #eaf6ff
background              #000000
selection_background    #db3776
selection_foreground    #000000
cursor                  #db3776
cursor_text_color       #000000

# Black / Bright black (void ladder)
color0  #0a0a0a
color8  #3b3b3b

# Red / Bright red (critical only)
color1  #ec4e53
color9  #ff7078

# Green / Bright green (success, softened)
color2  #52a462
color10 #74c584

# Yellow / Bright yellow (gold — the reference point)
color3  #f1bf40
color11 #ffd666

# Blue / Bright blue (sky — the text family, saturated)
color4  #5da3d6
color12 #8cc3ea

# Magenta / Bright magenta (pink — the primary accent)
color5  #db3776
color13 #e85a92

# Cyan / Bright cyan (soft glass)
color6  #6fc3c9
color14 #98dde2

# White / Bright white (light-blue text ladder)
color7  #9fb3c2
color15 #eaf6ff

# Window chrome
active_border_color   #db3776
inactive_border_color #3b3b3b
bell_border_color     #ec4e53

# Tab bar
tab_bar_background        #000000
tab_bar_margin_color      #000000
active_tab_foreground     #000000
active_tab_background     #db3776
inactive_tab_foreground   #9fb3c2
inactive_tab_background   #0a0a0a
tab_bar_min_tabs          1

# URL underline color
url_color #e85a92
