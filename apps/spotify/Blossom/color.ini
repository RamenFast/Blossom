; Blossom for Spotify (a spicetify theme)
; AMOLED void, pink primary, gold secondary, light-blue text.
; Install: symlink apps/spotify/Blossom into ~/.config/spicetify/Themes,
;          then: spicetify config current_theme Blossom && spicetify apply
[base]
text               = eaf6ff
subtext            = 9fb3c2
main               = 000000
main-elevated      = 0a0a0a
sidebar            = 000000
player             = 0a0a0a
card               = 141414
shadow             = 000000
selected-row       = db3776
button             = db3776
button-active      = e85a92
button-disabled    = 3b3b3b
tab-active         = db3776
notification       = 1c1c1c
notification-error = ec4e53
misc               = 2a2a2a
equalizer          = db3776
