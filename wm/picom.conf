# Blossom — minimal picom (compositor). Just enough to stop tearing and add a
# whisper of fade; no shadows/round-corners so the void stays flat and crisp.
# Optional: `cp wm/picom.conf ~/.config/picom.conf` (xmonad spawns picom at start).

backend = "glx";
vsync = true;

fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
fade-delta = 6;

shadow = false;
corner-radius = 0;

# Let the focused window read as fully present; dim nothing by default.
inactive-opacity = 1.0;
active-opacity = 1.0;
